<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Smart Parking - Verificare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background: #003d73; border: none; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <h2 class="text-center fw-bold">Gestiune Parcare</h2>
                    <form action="/verifica" method="POST">
                        <input type="text" name="numar" class="form-control form-control-lg" placeholder="Ex: IS18ZAR" required>
                        <button type="submit" class="btn btn-primary w-100 mt-3">Verifică</button>
                    </form>

                    {% if mesaj %}
                    <div class="alert {{ clasa }} mt-4">
                        {{ mesaj }}
                        {% if "negăsită" in mesaj %}
                        <button class="btn btn-sm btn-outline-dark mt-2 w-100" data-bs-toggle="modal" data-bs-target="#regModal">Creează Abonament</button>
                        {% endif %}
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="regModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form action="/inregistrare_noua" method="POST">
                    <div class="modal-body">
                        <h5>Înregistrare Abonament</h5>
                        <input type="text" name="numar" class="form-control mb-2" value="{{ numar_incercat }}" readonly>
                        <input type="text" name="nume" class="form-control mb-2" placeholder="Nume Proprietar" required>
                        <select name="luni" class="form-select">
                            <option value="1">1 Lună</option>
                            <option value="12">12 Luni</option>
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success">Confirmă</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
